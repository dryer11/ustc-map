// === Util ===
function dist(a,b){
  const R=6371000,dLat=(b[0]-a[0])*Math.PI/180,dLng=(b[1]-a[1])*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  const d=R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
  return d<1000?`${Math.round(d)}m`:`${(d/1000).toFixed(1)}km`;
}
function esc(s){ return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

function isFaved(n){return getFavs().some(f=>f.name===n);}

// === 周边搜索 ===
let searchMarkers=[];
function clearSearchMarkers(){searchMarkers.forEach(m=>map.removeLayer(m));searchMarkers=[];}

async function searchPOI(keyword,types){
  const el=document.getElementById('results');
  el.innerHTML='<div class="loading">搜索中...</div>';
  clearSearchMarkers();
  let url=`https://restapi.amap.com/v3/place/around?key=${AMAP_KEY}&location=${CAMPUS_LOC}&radius=3000&offset=25&extensions=all`;
  if(types)url+=`&types=${types}`;
  if(keyword)url+=`&keywords=${encodeURIComponent(keyword)}`;
  try{
    const r=await fetch(url);const data=await r.json();
    if(data.status==='1'&&data.pois?.length)renderSearch(data.pois);
    else el.innerHTML='<div class="loading">未找到结果 🤷</div>';
  }catch{el.innerHTML='<div class="loading">网络错误</div>';}
}

function renderSearch(pois){
  const el=document.getElementById('results');
  el.innerHTML=`<div class="section-header">找到 ${pois.length} 个 · 3km内</div>`;
  const bounds=[CAMPUS_CENTER];
  window._lastPois=pois;
  pois.forEach((poi,idx)=>{
    const [lng,lat]=poi.location.split(',').map(Number);
    const d=poi.distance||'?';
    const rating=poi.biz_ext?.rating||'';
    const cost=poi.biz_ext?.cost&&poi.biz_ext.cost!=='[]'?poi.biz_ext.cost:'';
    const addr=poi.address&&poi.address!=='[]'?poi.address:'';
    const fv=isFaved(poi.name);
    const m=L.circleMarker([lat,lng],{radius:7,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:0.85,weight:1.5}).addTo(map);
    m.bindTooltip(poi.name,{offset:[0,-8]});
    m.on('click',()=>showAmapPopup(poi));
    searchMarkers.push(m);bounds.push([lat,lng]);
    el.innerHTML+=`<div class="poi-card" onclick="map.setView([${lat},${lng}],17);showAmapPopup(window._lastPois[${idx}])">
      <div class="poi-icon">📍</div>
      <div class="poi-body">
        <div class="poi-name">${poi.name} <span class="fav-star ${fv?'faved':''}" onclick="event.stopPropagation();toggleAmapFav(this,'${esc(poi.name)}',${lat},${lng},'${esc(addr)}','${rating}','${cost}')">${fv?'★':'☆'}</span></div>
        <div class="poi-meta">
          ${rating?`<span class="poi-rating">⭐${rating}</span>`:''}
          ${cost?`<span class="poi-cost">¥${cost}/人</span>`:''}
          <span class="poi-dist">📍${d}m</span>
        </div>
        ${addr?`<div class="poi-addr">${addr}</div>`:''}
        <div class="poi-links">
          <a href="${xhsUrl(poi.name)}" target="_blank" onclick="event.stopPropagation()">📕 小红书</a>
          <a href="${dzdpUrl(poi.name)}" target="_blank" onclick="event.stopPropagation()">🟠 点评</a>
          <a href="${forumUrl(poi.name)}" target="_blank" onclick="event.stopPropagation()">🍵 茶馆</a>
        </div>
      </div></div>`;
  });
  if(pois.length>1)map.fitBounds(L.latLngBounds(bounds).pad(0.1));
}

function toggleAmapFav(el,name,lat,lng,addr,rating,cost){
  if(isFaved(name)){removeFav(name);el.classList.remove('faved');el.textContent='☆';}
  else{addFav({name,lat,lng,addr,rating,cost,icon:'📍'});el.classList.add('faved');el.textContent='★';}
  renderFavs();
}

function loadForum(tag='campus'){
  const el=document.getElementById('forumResults');
  const posts=FORUM_DATA[tag];
  if(!posts||!posts.length){
    el.innerHTML=`<div class="loading">暂无帖子 · <a href="https://ustcforum.com/t/${tag}" target="_blank" style="color:#60a5fa">直接访问茶馆</a></div>`;
    return;
  }
  el.innerHTML='';
  if(tag==='hearsay'){
    el.innerHTML+=`<div class="note-box">📣 蜗壳小道消息（USTC小道消息）在南七茶馆发帖较少，更多内容请关注其<b>微信公众号</b>（搜索「USTC小道消息」）。<br>以下为茶馆历史帖子：</div>`;
  }
  posts.forEach(d=>{
    const isHot=d.r>=10||d.v>=1000;
    el.innerHTML+=`<div class="forum-card" onclick="window.open('https://ustcforum.com/d/${d.id}','_blank')">
      <div class="forum-title">${d.t}</div>
      <div class="forum-meta">
        <span>${d.a}</span>
        <span>💬 ${d.r}</span>
        <span>👁️ ${d.v}</span>
        <span>${formatTime(d.ts)}</span>
        ${isHot?'<span class="forum-tag hot">🔥 热门</span>':''}
      </div>
    </div>`;
  });
}

function formatTime(iso){
  if(!iso)return '';
  const d=new Date(iso), now=new Date();
  const diff=Math.floor((now-d)/1000);
  if(diff<3600) return `${Math.floor(diff/60)}分钟前`;
  if(diff<86400) return `${Math.floor(diff/3600)}小时前`;
  if(diff<604800) return `${Math.floor(diff/86400)}天前`;
  return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
}

// === Tab switch ===
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.style.display='none');
  document.getElementById('tab-'+tab).style.display='block';
  // Update search placeholder based on active tab
  const si=document.getElementById('searchInput');
  if(tab==='news'){
    si.placeholder='🔍 搜资讯（关键词搜通知公告/学术报告）';
  } else if(tab==='nearby'){
    si.placeholder='🔍 搜周边（奶茶、火锅、健身...）';
  } else {
    si.placeholder='🔍 搜周边（奶茶、火锅、健身...）';
  }
  if(tab==='campus')renderCampus();
  if(tab==='favs')renderFavs();
  if(tab==='forum')loadForum('campus');
  if(tab==='nearby'){clearSearchMarkers();goHome();}
  if(tab==='news')loadNews();
}

// News type button listeners
document.querySelectorAll('.news-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.news-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    loadNews(btn.dataset.ntype);
  };
});

// === 资讯 tab (静态数据，定期更新) ===
let newsCurrentType='notice'; // 'notice'=通知公告, 'academic'=学术报告
let newsCurrentKeyword='';

function loadNews(type, keyword){
  if(type) newsCurrentType=type==='2'||type===2?'notice':type==='3'||type===3?'academic':type;
  if(keyword!==undefined && keyword!==null) newsCurrentKeyword=keyword.toLowerCase();
  renderStaticNews();
}

function renderStaticNews(){
  const el=document.getElementById('newsResults');
  const items=NEWS_DATA[newsCurrentType]||[];
  const typeLabel=newsCurrentType==='notice'?'📋 通知公告':'🎓 学术报告';
  const detailUrl=newsCurrentType==='notice'
    ?'https://i.ustc.edu.cn/page/site/noticeAnnouncement'
    :'https://i.ustc.edu.cn/page/site/academicReport';
  // Filter by keyword if any
  const filtered=newsCurrentKeyword
    ?items.filter(it=>it.title.toLowerCase().includes(newsCurrentKeyword)||
                      (it.tags||[]).some(t=>t.toLowerCase().includes(newsCurrentKeyword)))
    :items;
  if(!filtered.length){
    el.innerHTML=`<div class="loading">暂无相关资讯 📭${newsCurrentKeyword?' · 关键词: '+newsCurrentKeyword:''}</div>`;
    return;
  }
  el.innerHTML=`<div class="section-header">${typeLabel} · ${filtered.length} 条 · 快照 ${NEWS_DATA.snapshot}</div>`;
  filtered.forEach(item=>{
    const tags=(item.tags||[]).map(t=>{
      const isAcademic=newsCurrentType==='academic';
      return `<span class="news-tag${isAcademic?' academic':''}">${t}</span>`;
    }).join(' ');
    const date=item.date?item.date.split(' ')[0]:'';
    el.innerHTML+=`<div class="news-card" onclick="window.open('${detailUrl}','_blank')">
      <div class="news-title">${item.title}</div>
      <div class="news-meta">
        <span>📅 ${date}</span>
        <span>👁️ ${item.clicks||0}</span>
        ${tags}
      </div>
    </div>`;
  });
  el.innerHTML+=`<div class="note-box">📅 数据快照: ${NEWS_DATA.snapshot} · 由 Alpha 定期更新<br>查看最新: <a href="${detailUrl}" target="_blank">i.ustc.edu.cn</a></div>`;
}
